<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawfect Walk & Travel Essentials</title>
    <link rel="stylesheet" href="./walk&travel.css">
</head>

<body>
    <header>
        <h1>🐕 Pawfect Walk & Travel Essentials Products</h1>
        <div class="cart-info" id="cart-btn">🛒 Cart (<span id="cart-count">0</span>)</div>
    </header>

    <div class="controls">
        <input type="text" id="search" placeholder="Search essentials...">
        <select id="category">
            <option value="all">All</option>
            <option value="collars">Collars</option>
            <option value="leashes">Leashes</option>
            <option value="harnesses">Harnesses</option>
            <option value="carrier">Carrier & Travel Supplies</option>
            <option value="cages">Cages & Crates</option>
            <option value="accessories">Accessories</option>
        </select>
        <select id="sort">
            <option value="az">A - Z</option>
            <option value="za">Z - A</option>
            <option value="plh">Low → High</option>
            <option value="phl">High → Low</option>
        </select>
    </div>

    <div class="products" id="product-list"></div>
    <script src="./walk&travel.js"></script>
</body>

</html>
