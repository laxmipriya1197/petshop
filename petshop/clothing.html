<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawfect Dog Clothing Shop</title>
    <link rel="stylesheet" href="./clothing.css">
</head>

<body>
    <header>
        <h1>🐾 Pawfect Dog Clothing Products</h1>
        <div class="cart-info">🛒 Cart (<span id="cart-count">0</span>)</div>
    </header>

    <div class="controls">
        <input type="text" id="search" placeholder="Search clothing...">
        <select id="category">
            <option value="all">All</option>
            <option value="ethnic">Ethnic Wear</option>
            <option value="ear">Ear Muffs</option>
            <option value="bandanas">Bandanas & Bow Ties</option>
            <option value="boots">Boots & Socks</option>
            <option value="tshirts">T-Shirts & Shirts</option>
            
            
        </select>
        <select id="sort">
            <option value="az">A - Z</option>
            <option value="za">Z - A</option>
            <option value="plh">Low → High</option>
            <option value="phl">High → Low</option>
        </select>
    </div>

    <div class="products" id="product-list"></div>
    <script src="./clothing.js"></script>
</body>

</html>
