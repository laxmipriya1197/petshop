<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pawfect Dog Shop - Contact Us</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    body {
        font-family: Arial, sans-serif;
        background: #fffaf5;
        margin: 0;
        padding: 0;
    }

    header {
        background: rgb(245, 169, 186);
        color: white;
        text-align: center;
        padding: 15px;
        font-size: 24px;
        font-weight: bold;
    }

    .sec-contact {
        background: #ffeaea;
        padding: 30px;
        border-radius: 10px;
        margin: 30px auto;
        width: 80%;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .links {
        text-align: center;
        margin-bottom: 15px;
    }

    .links a {
        color: #ff7b00;
        text-decoration: none;
        margin: 0 5px;
        font-weight: bold;
    }

    .icons {
        text-align: center;
        margin-bottom: 15px;
    }

    .icons i {
        font-size: 24px;
        margin: 0 10px;
        color: rgb(245, 169, 186);
        cursor: pointer;
    }

    .contact-info {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    .form-section {
        text-align: center;
    }

    form {
        display: inline-block;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, textarea {
        width: 250px;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        background: rgb(245, 169, 186);
        border: none;
        color: white;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        background: #ff98b6;
    }
</style>
</head>
<body>

<header>Contact Us</header>

<div class="sec-contact">
    <div class="contact">
        <div class="links">
            <a href="index.html">HOME</a>|
            <a href="product.html">PRODUCTS</a>|
            <a href="gallery.html">GALLERY</a>|
            <a href="testimonials.html">TESTIMONIALS</a>|
            <a href="contact.html">CONTACT</a>
        </div>

        <div class="icons">
            <font><i class="fa-brands fa-facebook"></i></font>
            <font><i class="fa-brands fa-instagram"></i></font>
            <font><i class="fa-brands fa-whatsapp"></i></font>
        </div>

        <div class="contact-info">
            <span><b>Phone :</b> +91 9850510411</span><br>
            <span><b>Email :</b> info@pawpalace.com</span><br>
            <span><b>Address :</b> 3E Raja Street, Townhall, Coimbatore-641109</span><br>
        </div>
    </div>

    <div class="form-section">
        <h2>Send Us a Message</h2>
        <form id="contactForm">
            <input type="text" id="name" placeholder="Your Name" required><br>
            <input type="email" id="email" placeholder="Your Email" required><br>
            <textarea id="message" rows="4" placeholder="Your Message..." required></textarea><br>
            <button type="submit">Submit</button>
        </form>
    </div>
</div>

<script>
// Simple beginner-level form handling
document.getElementById("contactForm").addEventListener("submit", function(event) {
    event.preventDefault(); // stops page reload
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const message = document.getElementById("message").value;

    if (name && email && message) {
        alert("Thank you, " + name + "! Your message has been sent successfully 😊");
        document.getElementById("contactForm").reset();
    } else {
        alert("Please fill out all fields before submitting.");
    }
});
</script>

</body>
</html>
