<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pawfect Dog Food Shop</title>
<link rel="stylesheet" href="./food.css">
</head>
<body>

<header>
  <h1>🐾 Pawfect Dog Food Products</h1>
  <div class="cart-info" id="cart-btn">🛒 Cart (<span id="cart-count">0</span>)</div>
</header><br><br>

<div class="controls">
  <input type="text" id="search" placeholder="Search food...">
  <select id="category">
    <option value="all">All</option>
    <option value="dry">Dry</option>
    <option value="wet">Wet</option>
    <option value="grainfree">Grain Free</option>
    <option value="puppy">Puppy</option>
    <option value="baked-dry">Baked Dry</option>
  </select>
  <select id="sort">
    <option value="az">A - Z</option>
    <option value="za">Z - A</option>
    <option value="plh">Low → High</option>
    <option value="phl">High → Low</option>
  </select>
</div>
<br><br><br>
<div class="products" id="product-list"></div>

<script src="./food.js"></script>
</body>
</html>
